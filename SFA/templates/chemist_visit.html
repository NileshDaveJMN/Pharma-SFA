{% extends 'base.html' %}

{% block content %}
<div class="card p-3 shadow-sm border-0 mb-4 bg-white rounded-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h5 class="fw-bold text-dark mb-0">🧪 {{ chemist.name }}</h5>
            <small class="text-muted">Ph: {{ chemist.phone }}</small>
        </div>
        <span class="badge bg-primary px-3 py-2">Order Booking</span>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 60%;">Product</th>
                        <th class="text-center" style="width: 40%;">Order Qty</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td>
                            <span class="fw-bold d-block text-dark">{{ product.name }}</span>
                            <small class="text-muted">₹{{ product.price }}</small>
                        </td>
                        <td>
                            <input type="number" name="order_{{ product.id }}" class="form-control text-center" placeholder="0" min="0">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success w-100 fw-bold py-3 shadow">✅ Submit Chemist Order</button>
            <a href="{% url 'mr_dashboard' %}" class="btn btn-outline-secondary w-100 fw-bold py-2 mt-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
