<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFA Super App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Niche bottom bar ke piche text na chhupe isliye margin */
        body { padding-bottom: 75px; } 
        .bottom-nav { background-color: #ffffff; border-top: 1px solid #dee2e6; }
        .nav-item { text-align: center; flex: 1; padding: 5px 0; color: #6c757d; font-size: 0.75rem; text-decoration: none;}
        .nav-item.active { color: #0d6efd; font-weight: bold; border-top: 2px solid #0d6efd;}
        .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 2px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fw-bold">SFA Mobile</span>
            <span class="navbar-text text-white">Hi, {{ request.user.employee.name }}!</span>
        </div>
    </nav>

    <div class="container mt-3">
        {% block content %}
        {% endblock %}
    </div>

    <div class="fixed-bottom bottom-nav d-flex justify-content-between shadow-lg">
        
         <a href="{% url 'day_start' %}" class="nav-item">
    <span class="nav-icon">🌅</span>Start
</a>

        <a href="{% url 'request_hub' %}" class="nav-item">
    <span class="nav-icon">➕</span>Request
</a>
        <a href="{% url 'view_hub' %}" class="nav-item">
    <span class="nav-icon">👁️</span>View
</a>

        <a href="{% url 'mr_dashboard' %}" class="nav-item active">
            <span class="nav-icon">💼</span>DCR
        </a>
        <a href="{% url 'day_end' %}" class="nav-item">
    <span class="nav-icon">🛑</span>End
</a>

        </a>
    </div>

</body>
</html>
