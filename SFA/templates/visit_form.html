<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Visit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container-fluid">
            <a href="{% url 'mr_dashboard' %}" class="text-white text-decoration-none h4 mb-0">⬅</a>
            <span class="navbar-brand mb-0 h1">Visit Form</span>
            <span></span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="mb-4">
            <h4 class="text-primary mb-0 fw-bold">Dr. {{ doctor.name }}</h4>
            <small class="text-muted text-uppercase">{{ doctor.specialty }}</small>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <h6 class="text-muted px-1 mb-3">PRODUCTS & SAMPLING</h6>
            
            {% for product in products %}
            <div class="card mb-3 shadow-sm border-0 rounded-3">
                <div class="card-body">
                    <h6 class="card-title fw-bold text-dark mb-3">{{ product.name }}</h6>
                    <div class="row align-items-center">
                        <div class="col-4 text-center">
                            <label class="small text-muted d-block mb-1">Detailed</label>
                            <div class="form-check form-switch d-inline-block">
                                <input class="form-check-input fs-5" type="checkbox" name="detailed_{{ product.id }}">
                            </div>
                        </div>
                        <div class="col-4">
                            <label class="small text-muted mb-1">Samples</label>
                            <input type="number" class="form-control text-center bg-light" name="sample_{{ product.id }}" min="0" placeholder="0">
                        </div>
                        <div class="col-4">
                            <label class="small text-muted mb-1">Rx Order</label>
                            <input type="number" class="form-control text-center bg-light" name="order_{{ product.id }}" min="0" placeholder="0">
                        </div>
                    </div>
                </div>
            </div>
            {% empty %}
                <div class="alert alert-warning text-center">Koi products available nahi hain.</div>
            {% endfor %}
            <div class="mb-4">
    <label class="form-label text-muted small fw-bold">Special Remark / Note (Optional)</label>
    <textarea name="remark" class="form-control" rows="2" placeholder="Dr. se kya baat hui?"></textarea>
</div>


            <button type="submit" class="btn btn-success w-100 py-3 mt-2 mb-5 fw-bold shadow">✔ Submit Visit Data</button>
        </form>
    </div>

</body>
</html>
